name: android-build

# Builds the Ripple Android app (container app + shared crypto) into a debug APK.
# This is the ONLY real verification for the Android code — it can't be compiled
# in the usual agent sandbox (no Android SDK/Gradle). Runs on pushes that touch
# the app or the shared Kotlin crypto, and on demand.

on:
  push:
    branches: ["**"]
    paths:
      - "apps/android/**"
      - "packages/core-kt/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "packages/core-kt/**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish the APK to a Release
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ripple-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Publish a downloadable APK to a Release so the owner can just grab it.
      # On a v* tag → that versioned release; otherwise → a rolling "android-dev"
      # prerelease that always holds the latest build. Only from master / tags.
      - name: Stage APK
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp app/build/outputs/apk/debug/*.apk "$GITHUB_WORKSPACE/dist/Ripple-android.apk"

      - name: Publish APK to a Release
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'android-dev' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Ripple {0}', github.ref_name) || 'Ripple — Android (latest)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: dist/Ripple-android.apk
          body: |
            **Ripple for Android** — the keyboard + app (debug build, sideloadable).

            1. Download and install `Ripple-android.apk`.
            2. Open Ripple, pair with a code (or scan a QR).
            3. Enable **Ripple Keyboard** in Settings → System → Languages & input.

            Same APK runs on phones and Android TV. Updated automatically from `master`.
