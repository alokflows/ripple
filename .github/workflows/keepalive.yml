name: keep-alive

# Pings the deployed relay so Render's free tier never sleeps.
# No extra account, no card — runs on GitHub's free Actions minutes.
# Set the repo variable RENDER_URL to your deployed URL after deploying:
#   gh variable set RENDER_URL --body "https://your-app.onrender.com"

on:
  schedule:
    - cron: '*/10 * * * *' # every ~10 minutes (Render sleeps after 15 idle)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping relay /healthz
        run: |
          # Defaults to the public deployment so keep-alive works with zero setup.
          # Override by setting the repo variable RENDER_URL to your own URL.
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then URL="https://yap-mkk4.onrender.com"; fi
          echo "Pinging ${URL%/}/healthz"
          if curl -fsS --max-time 60 "${URL%/}/healthz"; then
            echo " — awake ✓"
          else
            echo " — ping failed (likely a cold start waking up)"
          fi
